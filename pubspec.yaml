name: redrive
description: "Open-source OBD2 dashboard app for real-time car data and diagnostics."
homepage: https://github.com/iUnreallx/ReDrive

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  provider: ^6.1.5+1
  flutter_blue_classic: ^0.0.9
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/svg/
    - assets/images/svg/dashboard/
    - assets/images/svg/bottomBar/
    - assets/images/png/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_ico.png"

  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/icon_foreground.png"

  min_sdk_android: 21
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/icons/app_ico.png"

  windows:
    generate: true
    image_path: "assets/icons/app_ico.png"


flutter_native_splash:
  color: "#000000"
  image: assets/icons/splash_logo.png

  color_dark: "#000000"
  image_dark: assets/icons/splash_logo.png

  android: true
  ios: true
  web: false

  android_12:
    color: "#000000"
    image: assets/icons/splash_logo.png
    icon_background_color: "#000000"